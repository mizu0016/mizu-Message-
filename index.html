<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mizu mseege</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fafafa; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { background: #333; color: white; padding: 15px; text-align: center; font-weight: bold; }
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { background: white; padding: 10px 15px; border-radius: 15px; border: 1px solid #eee; align-self: flex-start; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .footer { background: white; padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
    button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:disabled { background: #ccc; }
  </style>
</head>
<body>

<header>mizu mseege</header>

<div id="chat-box"></div>

<div class="footer">
  <input type="text" id="name" placeholder="名前" style="flex: 0.3;">
  <input type="text" id="content" placeholder="メッセージを入力...">
  <button id="send-btn" onclick="sendMessage()">送信</button>
</div>

<script>
  // ここにGASのウェブアプリURLを貼る
  const ENDPOINT = "YOUR_GAS_WEBAPP_URL";

  // メッセージ読み込み
  async function loadMessages() {
    try {
      const res = await fetch(ENDPOINT);
      const data = await res.json();
      const chatBox = document.getElementById('chat-box');
      chatBox.innerHTML = data.map(m => `
        <div class="msg">
          <small style="color:#888;">${m.name}</small><br>
          ${m.message}
        </div>
      `).join('');
      chatBox.scrollTop = chatBox.scrollHeight;
    } catch (e) {
      console.error("読み込みエラー:", e);
    }
  }

  // 送信処理
  async function sendMessage() {
    const name = document.getElementById('name').value || "ななし";
    const message = document.getElementById('content').value;
    const btn = document.getElementById('send-btn');

    if (!message) return;

    btn.disabled = true;
    try {
      await fetch(ENDPOINT, {
        method: "POST",
        body: JSON.stringify({ name: name, message: message })
      });
      document.getElementById('content').value = "";
      loadMessages();
    } catch (e) {
      alert("送信に失敗したよ");
    } finally {
      btn.disabled = false;
    }
  }

  // 初回読み込み
  loadMessages();
  // 10秒ごとに自動更新
  setInterval(loadMessages, 10000);
</script>

</body>
</html>
