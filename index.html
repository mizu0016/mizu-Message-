<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect</title>
    <style>
        :root { --line-green: #06c755; --line-bg: #7494be; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        input { border-radius: 8px; border: none; padding: 12px; margin: 10px; background: #1a1a1a; color: white; width: 80%; }
        
        /* 1. 多国利用OK（スタート画面） */
        #start-screen { align-items: center; justify-content: center; }
        .btn { width: 220px; padding: 15px; margin: 10px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }

        /* 2. ID検索画面（LINEお手本・トーク一覧風） */
        #search-screen { background: #fff; color: #000; }
        .header { padding: 15px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .search-bar { background: #f4f4f4; margin: 10px; padding: 10px; border-radius: 10px; color: #888; text-align: center; }
        .user-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #f9f9f9; }
        .user-icon { width: 50px; height: 50px; border-radius: 18px; background: #eee; margin-right: 15px; }

        /* 3. チャット画面（LINE風） */
        #chat-screen { background: var(--line-bg); }
        #chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .bubble { max-width: 70%; padding: 10px; margin: 5px; border-radius: 15px; color: #000; position: relative; font-size: 14px; }
        .mine { align-self: flex-end; background: #8de055; border-top-right-radius: 2px; }
        .others { align-self: flex-start; background: #fff; border-top-left-radius: 2px; }

        /* 4. プロフィール（インスタ風） */
        .profile-header { display: flex; padding: 20px; align-items: center; border-bottom: 1px solid #262626; }
        .avatar { width: 77px; height: 77px; border-radius: 50%; background: #333; margin-right: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #262626; }

        /* ナビゲーション */
        .nav { display: flex; justify-content: space-around; background: #fff; border-top: 1px solid #eee; padding: 10px 0; color: #000; position: fixed; bottom: 0; width: 100%; }
        .dark-nav { background: #000; border-color: #262626; color: #fff; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1 style="font-size:32px;">MizukiConnect</h1>
        <button class="btn" style="background:var(--line-green); color:#fff;" onclick="setLang('jp')">日本語でスタート</button>
        <button class="btn" style="background:#fff; color:#000;" onclick="setLang('en')">English Start</button>
    </div>

    <div id="reg-screen" class="screen" style="align-items:center; justify-content:center;">
        <h2>Login / Sign Up</h2>
        <input type="email" id="user-email" placeholder="メールアドレス">
        <input type="text" id="mizu-id" placeholder="ID (英数字6-20)" oninput="vId()">
        <input type="text" id="mizu-name" maxlength="17" placeholder="名前 (最大17文字)">
        <button id="reg-btn" class="btn" style="background:#fff; color:#000;" onclick="handleLogin()" disabled>ログイン / 登録</button>
    </div>

    <div id="search-screen" class="screen">
        <div class="header">トーク <span>🔍 👤+ ⚙️</span></div>
        <div class="search-bar">ID検索・キーワード検索</div>
        <div id="user-list">
            <div class="user-item" onclick="switchScreen('chat-screen')">
                <div class="user-icon"></div>
                <div><b>公式ガイド</b><br><small style="color:gray;">MizukiConnectへようこそ！</small></div>
            </div>
        </div>
        <div class="nav">
            <span onclick="switchScreen('search-screen')">🏠</span>
            <span onclick="switchScreen('chat-screen')">💬</span>
            <span onclick="switchScreen('profile-screen')">👤</span>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header" style="background:#fff; color:#000;">チャットルーム <span onclick="switchScreen('search-screen')">✕</span></div>
        <div id="chat-area"></div>
        <div style="padding:10px 10px 70px; background:#fff; display:flex;">
            <input type="text" id="msg-input" style="background:#eee; color:#000; flex:1;" placeholder="Aa">
            <button onclick="sendMsg()" style="color:var(--line-green); background:none; font-weight:bold;">送信</button>
        </div>
        <div class="nav">
            <span onclick="switchScreen('search-screen')">🏠</span>
            <span onclick="switchScreen('chat-screen')">💬</span>
            <span onclick="switchScreen('profile-screen')">👤</span>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <div class="avatar"></div>
            <div style="display:flex; flex:1; justify-content:space-around; text-align:center;">
                <div><b>0</b><br>投稿</div><div><b>0</b><br>フォロワー</div><div><b>0</b><br>フォロー</div>
            </div>
        </div>
        <div style="padding:15px;"><b id="display-name"></b></div>
        <div class="grid"><div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div></div>
        <div class="nav dark-nav">
            <span onclick="switchScreen('search-screen')">🏠</span>
            <span onclick="switchScreen('chat-screen')">💬</span>
            <span onclick="switchScreen('profile-screen')">👤</span>
        </div>
    </div>

    <script>
        let userData = { email: '', id: '', name: '' };
        let messages = [];

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setLang(l) { switchScreen('reg-screen'); }

        function vId() {
            const id = document.getElementById('mizu-id').value;
            const btn = document.getElementById('reg-btn');
            btn.disabled = !(/^[a-zA-Z0-9]{6,20}$/.test(id));
        }

        function handleLogin() {
            const email = document.getElementById('user-email').value;
            const id = document.getElementById('mizu-id').value;
            const name = document.getElementById('mizu-name').value;

            // ローカルストレージに保存（同じメアドならそのまま通す）
            const saved = localStorage.getItem('mizu_user_' + email);
            if (saved) {
                userData = JSON.parse(saved);
            } else {
                userData = { email, id, name };
                localStorage.setItem('mizu_user_' + email, JSON.stringify(userData));
                // スプレッドシートへ送信
                fetch(`https://script.google.com/macros/s/YOUR_GAS_ID/exec?email=${email}&id=${id}&name=${encodeURIComponent(name)}`);
            }
            document.getElementById('display-name').innerText = userData.name;
            switchScreen('search-screen'); // いきなりチャットではなくID検索（トーク一覧）画面へ
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            const msg = { text: input.value, time: Date.now(), mine: true };
            messages.push(msg);
            input.value = '';
            renderChat();
        }

        function renderChat() {
            const area = document.getElementById('chat-area');
            area.innerHTML = messages.map(m => `
                <div class="bubble ${m.mine ? 'mine' : 'others'}">${m.text}
                    ${(Date.now() - m.time < 86400000) ? `<small onclick="addText(${m.time})" style="cursor:pointer; opacity:0.5;">[追記]</small>` : ''}
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        }

        function addText(time) {
            const extra = prompt("文字を追加します（24h以内）:");
            if (extra) {
                const msg = messages.find(m => m.time === time);
                msg.text += " " + extra;
                renderChat();
            }
        }
    </script>
</body>
</html>
