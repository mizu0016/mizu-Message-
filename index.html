<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect - Start</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        /* 多国利用OK画面（スタート画面） */
        .lang-select { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; width: 80%; max-width: 400px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-jp { background: #ff0050; color: white; } /* TikTok風カラー */
        .btn-en { background: #00f2ea; color: black; }
        
        /* 入力画面（非表示） */
        #registration { display: none; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .error { color: #ff0050; font-size: 12px; text-align: left; }
    </style>
</head>
<body>

    <div id="start-screen" class="lang-select">
        <h1>MizukiConnect</h1>
        <p>Select your language / 言語を選択</p>
        <button class="btn btn-jp" onclick="goToReg('jp')">日本語 / Japanese</button>
        <button class="btn btn-en" onclick="goToReg('en')">English / 英語</button>
        <button class="btn" style="background:#555" onclick="goToReg('ko')">한국어 / Korean</button>
    </div>

    <div id="registration">
        <h2 id="reg-title">アカウント作成</h2>
        
        <label>ユーザーID (英数字6-20文字)</label>
        <input type="text" id="mizu-id" placeholder="example123" oninput="validateID()">
        <div id="id-error" class="error"></div>

        <label>名前 (最大17文字)</label>
        <input type="text" id="mizu-name" maxlength="17" placeholder="Mizuki">
        
        <button class="btn btn-jp" id="submit-btn" onclick="saveToSheet()" disabled>登録してスタート！</button>
    </div>

    <script>
        let selectedLang = 'jp';

        function goToReg(lang) {
            selectedLang = lang;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('registration').style.display = 'block';
            if(lang === 'en') document.getElementById('reg-title').innerText = 'Create Account';
        }

        // 瑞希さんの絶対ルール：IDバリデーション
        function validateID() {
            const idInput = document.getElementById('mizu-id');
            const errorDiv = document.getElementById('id-error');
            const btn = document.getElementById('submit-btn');
            const idValue = idInput.value;
            
            const regex = /^[a-zA-Z0-9]+$/; // 英数字のみ
            
            if (idValue.length < 6 || idValue.length > 20) {
                errorDiv.innerText = "IDは6文字から20文字までだよ！";
                btn.disabled = true;
            } else if (!regex.test(idValue)) {
                errorDiv.innerText = "IDは英数字だけで書いてね！";
                btn.disabled = true;
            } else {
                errorDiv.innerText = "";
                btn.disabled = false;
            }
        }

        function saveToSheet() {
            const id = document.getElementById('mizu-id').value;
            const name = document.getElementById('mizu-name').value;
            
            // ここで瑞希さんのスプレッドシート（1j7ROuKh...）にデータを送るGASを呼び出す
            alert("スプレッドシートに保存中...\nID: " + id + "\nName: " + name);
            // 実際は google.script.run を使ってGASに飛ばすよ
        }
    </script>
</body>
</html>
