<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --line-green: #06c755; --line-bg: #7494be; --mizu-black: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; overflow-x: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }
        
        /* 🏠 ホーム（ここからは白背景） */
        #home-screen, #chat-screen { background: #fff; color: #000; justify-content: flex-start; }
        .header { width: 100%; padding: 15px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; box-sizing: border-box; }
        
        .btn { width: 250px; padding: 15px; margin: 10px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        input { border-radius: 8px; border: none; padding: 15px; margin: 10px; background: var(--mizu-black); color: white; width: 80%; max-width: 300px; }

        /* ナビゲーション */
        .nav { display: flex; justify-content: space-around; background: #fff; border-top: 1px solid #eee; padding: 15px 0; position: fixed; bottom: 0; width: 100%; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div id="id-setup-screen" class="screen active">
        <h1>MizukiConnect</h1>
        <p>IDを決めてスタート</p>
        <input type="text" id="mizu-id" placeholder="マイID (6文字〜)" oninput="vId()">
        <input type="text" id="mizu-name" placeholder="表示名">
        <button id="next-btn" class="btn" style="background:#fff; color:#000;" onclick="switchScreen('login-screen')" disabled>次へ</button>
        <div style="margin-top:20px; font-size:12px; color:#888; cursor:pointer;" onclick="switchScreen('home-screen')">（登録済みの方はこちら）</div>
    </div>

    <div id="login-screen" class="screen">
        <h2>Google連携</h2>
        <div id="g_id_onload" data-client_id="391723430266-hiijbc67trrqmumu6160fj61g2nvauba.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <button class="btn" style="background:none; color:#888;" onclick="switchScreen('id-setup-screen')">戻る</button>
    </div>

    <div id="home-screen" class="screen">
        <div class="header">トーク <span>🔍 👤+</span></div>
        <div style="padding:20px; border-bottom:1px solid #eee; width:100%; text-align:left; cursor:pointer;" onclick="switchScreen('chat-screen')">
            <b>Mizu公式ガイド</b><br><small style="color:gray;">中に入れたね！おめでとう！</small>
        </div>
        <div class="nav">
            <div onclick="switchScreen('home-screen')">🏠</div>
            <div onclick="switchScreen('chat-screen')">💬</div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <span onclick="switchScreen('home-screen')">＜</span> <span>公式チャット</span>
        </div>
        <div id="chat-area" style="flex:1; width:100%; padding:10px; background:var(--line-bg); overflow-y:auto;">
            <div style="background:#fff; padding:10px; border-radius:10px; width:fit-content; margin:5px;">いらっしゃい！</div>
        </div>
        <div class="nav">
            <div onclick="switchScreen('home-screen')">🏠</div>
            <div onclick="switchScreen('chat-screen')">💬</div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbw-E_MHkIPI8VjStwkUGjJOwdd1cPqoRJHHX-2LSt6ssL4J7bI4RXhqOjHw_WBS1KYNzw/exec";

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function vId() {
            const id = document.getElementById('mizu-id').value;
            document.getElementById('next-btn').disabled = (id.length < 6);
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const myId = document.getElementById('mizu-id').value;
            const myName = document.getElementById('mizu-name').value || "名無し";

            fetch(`${SHEET_URL}?email=${encodeURIComponent(payload.email)}&id=${encodeURIComponent(myId)}&name=${encodeURIComponent(myName)}`, { mode: 'no-cors' });
            
            // ログインしたことを保存
            localStorage.setItem('mizu_login', 'true');
            switchScreen('home-screen');
        }

        // ページを開いた時のチェック
        window.onload = () => {
            if (localStorage.getItem('mizu_login') === 'true') {
                switchScreen('home-screen'); // ログイン済みなら即ホームへ
            }
        }
    </script>
</body>
</html>
